name: green_invest
description: "GreenInvest – Sustainable Stock Portfolio Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  shimmer: ^3.0.0
  gap: ^3.0.1
  flutter_animate: ^4.5.2

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Environment
  flutter_dotenv: ^5.2.1

  # Serialization
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - .env
